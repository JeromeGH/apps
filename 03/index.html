  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo } = React;

      // 1. DATA CONFIGURATION & CRITERIA (D.S. 127/77)
      const rubrosConfig = [
        {
          id: 'A',
          nombre: 'Dirección Técnica de la Ejecución de las Obras',
          peso: 0.60,
          subfactors: [
            { id: 'A1', nombre: 'Calidad de Ejecución y Terminaciones', puntosMaximos: 35, descripcion: 'Inspección de terminaciones, ausencia de fallas constructivas, apego estricto a planos y estándares estéticos exigidos por el SERVIU.' },
            { id: 'A2', nombre: 'Organización, Programación y Plazos', puntosMaximos: 25, descripcion: 'Cumplimiento del cronograma de obras (Gantt), ritmo de avance, capacidad de reacción ante imprevistos técnicos y finalización dentro del plazo.' },
            { id: 'A3', nombre: 'Especificaciones y Órdenes de la ITO', puntosMaximos: 20, descripcion: 'Cumplimiento diligente de anotaciones en el Libro de Obras y directrices técnicas entregadas por el Inspector Técnico de Obras (ITO).' },
            { id: 'A4', nombre: 'Idoneidad del Personal Técnico', puntosMaximos: 10, descripcion: 'Calificación, experiencia y permanencia en terreno del profesional residente y equipo de apoyo técnico asignado.' },
            { id: 'A5', nombre: 'Equipos y Maquinaria en Obra', puntosMaximos: 10, descripcion: 'Disponibilidad, estado mecánico continuo, seguridad de los operadores y suficiencia de la maquinaria para las faenas contratadas.' }
          ]
        },
        {
          id: 'B',
          nombre: 'Comportamiento Administrativo y Aspectos Legales / Laborales',
          peso: 0.30,
          subfactors: [
            { id: 'B1', nombre: 'Comportamiento Administrativo y Relación con SERVIU', puntosMaximos: 35, descripcion: 'Entrega oportuna de documentación contractual, calidad y rigor en estados de pago, informes mecánicos, y relación colaborativa.' },
            { id: 'B2', nombre: 'Obligaciones Laborales y Previsionales', puntosMaximos: 35, descripcion: 'Historial impecable de pagos de remuneraciones, imposiciones, cotizaciones mutuales y cumplimiento cabal con subcontratistas y proveedores.' },
            { id: 'B3', nombre: 'Seguridad, Higiene y Prevención de Riesgos', puntosMaximos: 30, descripcion: 'Implementación del plan de prevención, uso de Equipos de Protección Personal (EPP), señalización víal y peatonal, y orden del campamento.' }
          ]
        },
        {
          id: 'C',
          nombre: 'Compromiso Medioambiental y Comunitario',
          peso: 0.10,
          subfactors: [
            { id: 'C1', nombre: 'Higiene Ambiental, Polución y Residuos', puntosMaximos: 50, descripcion: 'Control efectivo de emisión de polvo (riego constante), niveles de ruido, gestión y acopio ordenado de escombros y retiro autorizado.' },
            { id: 'C2', nombre: 'Relación Comunitaria y Mitigación', puntosMaximos: 50, descripcion: 'Gestión correcta de desvíos vehiculares, habilitación de pasos peatonales seguros, avisos previos a vecinos y resolución expedita de molestias.' }
          ]
        }
      ];

      // 2. HELPER EXTREMELY COMPACT ICON HANDLER (Replaces all lucide component imports perfectly)
      const Icon = ({ name, className = "" }) => {
        const hasSize = className.includes("w-") || className.includes("h-");
        const finalClassName = `${hasSize ? "" : "w-4 h-4"} ${className}`.trim();
        const icons = {
          FileText: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>,
          Sliders: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/></svg>,
          Download: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
          User: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
          Briefcase: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/></svg>,
          Plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
          Trash2: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
          CheckCircle2: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
          ChevronRight: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="m9 18 6-6-6-6"/></svg>,
          ChevronDown: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="m6 9 6 6 6-6"/></svg>,
          ChevronUp: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="m18 15-6-6-6 6"/></svg>,
          Info: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
          Share2: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>,
          SlidersHorizontal: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><line x1="4" x2="20" y1="4" y2="4"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="20" y2="20"/><polyline points="8 2 8 6"/><polyline points="16 10 16 14"/><polyline points="12 18 12 22"/></svg>,
          Building: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/></svg>,
          Check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={finalClassName}><path d="M20 6 9 17l-5-5"/></svg>,
        };
        return icons[name] || null;
      };

      // 3. COMPLETE PDF EXPORT FUNCTIONS (using jsPDF via CDN globally available at window.jspdf)
      function formatNumber(num, decimals = 2) {
        return num.toLocaleString('es-CL', {
          minimumFractionDigits: decimals,
          maximumFractionDigits: decimals
        });
      }

      function addWrappedText(doc, text, x, y, maxWidth, lineHeight = 5) {
        const lines = doc.splitTextToSize(text, maxWidth);
        for (let i = 0; i < lines.length; i++) {
          doc.text(lines[i], x, y + i * lineHeight);
        }
        return y + lines.length * lineHeight;
      }

      function generateOficioPDF(oficio, contractor, work, scoreTotal, gradeTotal) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        const marginX = 20;

        // Header drawing (blue / red blocks matching MINVU style)
        doc.setFillColor(0, 80, 157);
        doc.rect(marginX, 15, 18, 18, 'F');
        doc.setFillColor(193, 18, 31);
        doc.rect(marginX + 18, 15, 18, 18, 'F');

        doc.setTextColor(30, 30, 30);
        doc.setFont('Helvetica', 'bold');
        doc.setFontSize(8);
        doc.text('Ministerio de', marginX, 36);
        doc.text('Vivienda y', marginX, 39.5);
        doc.text('Urbanismo', marginX, 43);

        doc.setFontSize(6.5);
        doc.setTextColor(120, 120, 120);
        doc.setFont('Helvetica', 'normal');
        doc.text('Gobierno de Chile', marginX, 46.5);

        doc.setFont('Helvetica', 'bold');
        doc.setFontSize(14);
        doc.setTextColor(0, 80, 157);
        doc.text('TRABAJANDO', marginX + 44, 23);
        doc.setTextColor(193, 18, 31);
        doc.text('PARA USTED', marginX + 44, 29);

        doc.setDrawColor(193, 18, 31);
        doc.setLineWidth(0.4);
        doc.line(marginX + 44, 32, marginX + 85, 32);

        doc.setFont('Helvetica', 'bold');
        doc.setFontSize(9);
        doc.setTextColor(0, 80, 157);
        doc.text('OFICIO ELECTRÓNICO', marginX, 55);

        // Right side Divider
        doc.setDrawColor(200, 200, 200);
        doc.setLineWidth(0.2);
        doc.line(marginX + 92, 15, marginX + 92, 58);

        // Metadata
        doc.setFontSize(8.5);
        doc.setTextColor(30, 30, 30);
        const metaXLabel = marginX + 95;
        const metaXVal = marginX + 118;
        const wrapWidth = pageWidth - metaXVal - 15;

        let currentY = 19;
        doc.setFont('Helvetica', 'bold');
        doc.text('ORD. Nº  :', metaXLabel, currentY);
        doc.text(oficio.ordenNro, metaXVal, currentY);

        currentY += 5;
        doc.text('ANT.       :', metaXLabel, currentY);
        doc.setFont('Helvetica', 'normal');
        currentY = addWrappedText(doc, oficio.antecedentes, metaXVal, currentY, wrapWidth, 4.2) - 4.2;

        currentY += 6;
        doc.setFont('Helvetica', 'bold');
        doc.text('MAT.      :', metaXLabel, currentY);
        doc.setFont('Helvetica', 'normal');
        const matText = `${oficio.materia} (${formatNumber(scoreTotal, 2)} Puntos, Nota ${formatNumber(gradeTotal, 1)})`;
        currentY = addWrappedText(doc, matText, metaXVal, currentY, wrapWidth, 4.2) - 4.2;

        currentY += 6;
        doc.setFont('Helvetica', 'bold');
        doc.text('ADJ.       :', metaXLabel, currentY);
        doc.setFont('Helvetica', 'normal');
        currentY = addWrappedText(doc, oficio.adjuntos, metaXVal, currentY, wrapWidth, 4.2);

        let bodyY = Math.max(70, currentY + 8);
        doc.setFont('Helvetica', 'normal');
        doc.setFontSize(10);
        doc.text(`${oficio.ciudad}, ${oficio.fechaEmision}`, marginX, bodyY);

        bodyY += 10;
        doc.setFont('Helvetica', 'bold');
        doc.setFontSize(9.5);
        doc.text('A        :', marginX, bodyY);
        doc.text(contractor.nombreContratista.toUpperCase(), marginX + 18, bodyY);
        bodyY += 4.5;
        doc.text('CONTRATISTA', marginX + 18, bodyY);

        bodyY += 7;
        doc.text('DE      :', marginX, bodyY);
        doc.text(oficio.remitenteNombre.toUpperCase(), marginX + 18, bodyY);
        bodyY += 4.5;
        const splitCargo = doc.splitTextToSize(oficio.remitenteCargo.toUpperCase(), pageWidth - marginX - 45);
        for (let s = 0; s < splitCargo.length; s++) {
          doc.text(splitCargo[s], marginX + 18, bodyY);
          bodyY += 4.5;
        }

        bodyY += 4;
        doc.setDrawColor(220, 220, 220);
        doc.setLineWidth(0.15);
        doc.line(marginX, bodyY, pageWidth - marginX, bodyY);

        bodyY += 8;
        doc.setFont('Helvetica', 'normal');
        doc.setFontSize(10);
        const textPara1 = "1.   Adjunto me permito remitir a Uds. Calificación obtenida por esa Empresa Constructora, en conformidad a lo establecido en el D.S. Nº 127/77 (V. y U.), en la obra que se individualiza:";
        bodyY = addWrappedText(doc, textPara1, marginX, bodyY, pageWidth - marginX * 2, 5.5) + 3;

        // Details Grid
        const gridXLabel = marginX + 12;
        const gridXVal = marginX + 54;
        const gridValWidth = pageWidth - gridXVal - marginX;

        const metadataPairs = [
          { label: 'OBRA', val: work.nombreObra },
          { label: 'PROYECTO', val: work.proyectoCodigo || 'N/A' },
          { label: 'COMUNA', val: work.comuna },
          { label: 'FECHA DE RECEPCIÓN', val: work.fechaRecepcionUnica },
          { label: 'PUNTAJE OBTENIDO', val: `${formatNumber(scoreTotal, 2)} de un total de 100 puntos. (Nota Equivalente: ${formatNumber(gradeTotal, 1)})` }
        ];

        for (const pair of metadataPairs) {
          doc.setFont('Helvetica', 'bold');
          doc.text(`${pair.label}`, gridXLabel, bodyY);
          doc.text(':', gridXVal - 4, bodyY);
          doc.setFont('Helvetica', 'normal');
          bodyY = addWrappedText(doc, pair.val, gridXVal, bodyY, gridValWidth, 4.8);
          bodyY += 2;
        }

        bodyY += 3;
        const textPara2 = "2.   Finalmente se informa que la Empresa podrá apelar a la calificación indicada precedentemente acogiéndose a los procedimientos establecidos en la Ley Nº 19880/2008.-";
        bodyY = addWrappedText(doc, textPara2, marginX, bodyY, pageWidth - marginX * 2, 5.5);

        bodyY += 15;
        doc.setFont('Helvetica', 'normal');
        doc.text('Saluda atentamente a Ud.', marginX, bodyY);

        bodyY += 25;
        if (bodyY > pageHeight - 55) {
          doc.addPage();
          bodyY = 30;
        }

        doc.setFont('Helvetica', 'bold');
        doc.setFontSize(9.5);
        const sigName = oficio.remitenteNombre.toUpperCase();
        const sigCharge = oficio.remitenteCargo.toUpperCase();
        
        const nameWidth = doc.getTextWidth(sigName);
        doc.text(sigName, (pageWidth - nameWidth) / 2, bodyY);
        
        bodyY += 4.5;
        const splitSigCharge = doc.splitTextToSize(sigCharge, pageWidth - 40);
        for (let s = 0; s < splitSigCharge.length; s++) {
          const chargeWidth = doc.getTextWidth(splitSigCharge[s]);
          doc.text(splitSigCharge[s], (pageWidth - chargeWidth) / 2, bodyY);
          bodyY += 4.5;
        }

        bodyY += 15;
        if (bodyY > pageHeight - 45) {
          doc.addPage();
          bodyY = 30;
        }

        doc.setFont('Helvetica', 'normal');
        doc.setFontSize(7.5);
        doc.text(oficio.inicialesSello, marginX, bodyY);
        
        bodyY += 4;
        doc.setFont('Helvetica', 'bold');
        doc.text('Distribución:', marginX, bodyY);
        
        doc.setFont('Helvetica', 'normal');
        doc.setFontSize(7);
        bodyY += 3.5;

        for (let i = 0; i < oficio.distribuciones.length; i++) {
          const textDist = `- ${i + 1}.- ${oficio.distribuciones[i].toUpperCase()}`;
          bodyY = addWrappedText(doc, textDist, marginX, bodyY, pageWidth - marginX * 2, 3.5);
        }

        return doc;
      }

      function generateFormatoCalificacionPDF(contractor, work, scores, scoreTotal, gradeTotal) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        const marginX = 15;

        // Cover Box header
        doc.setFillColor(0, 80, 157);
        doc.rect(marginX, 12, pageWidth - marginX * 2, 10, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('Helvetica', 'bold');
        doc.setFontSize(10);
        doc.text('INFORME DE CALIFICACIÓN DE CONTRATISTA - FORMATO 1a', pageWidth / 2, 18, { align: 'center' });

        doc.setTextColor(30, 30, 30);
        doc.setFontSize(7.5);
        let gridY = 27;

        // General Metadata
        doc.text('1. ANTECEDENTES GENERALES DEL CONTRATISTA Y LA OBRA', marginX, gridY);
        doc.line(marginX, gridY + 1.5, pageWidth - marginX, gridY + 1.5);
        
        gridY += 5;
        doc.setFont('Helvetica', 'bold');
        doc.text('Nombre Contratista:', marginX, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(contractor.nombreContratista, marginX + 32, gridY);

        doc.setFont('Helvetica', 'bold');
        doc.text('R.U.T. Contratista:', marginX + 112, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(contractor.rut, marginX + 142, gridY);

        gridY += 4.5;
        doc.setFont('Helvetica', 'bold');
        doc.text('Registro / Categoría:', marginX, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(`${contractor.registro} - ${contractor.categoria} Cat. (Insc: ${contractor.numeroInscripcion})`, marginX + 32, gridY);

        doc.setFont('Helvetica', 'bold');
        doc.text('Serviu Regional:', marginX + 112, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(`${work.serviu} - Región ${work.region}`, marginX + 142, gridY);

        gridY += 4.5;
        doc.setFont('Helvetica', 'bold');
        doc.text('Nombre de la Obra:', marginX, gridY);
        doc.setFont('Helvetica', 'normal');
        const splitObra = doc.splitTextToSize(work.nombreObra, pageWidth - marginX * 2 - 35);
        doc.text(splitObra, marginX + 32, gridY);
        gridY += (splitObra.length - 1) * 3.5;

        gridY += 4.5;
        doc.setFont('Helvetica', 'bold');
        doc.text('Comuna / Provincia:', marginX, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(`${work.comuna} / ${work.provincia}`, marginX + 32, gridY);

        doc.setFont('Helvetica', 'bold');
        doc.text('Código Proyecto:', marginX + 112, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(work.proyectoCodigo || 'Sin Código', marginX + 142, gridY);

        gridY += 4.5;
        doc.setFont('Helvetica', 'bold');
        doc.text('F. Recepción Única:', marginX, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(work.fechaRecepcionUnica, marginX + 32, gridY);

        doc.setFont('Helvetica', 'bold');
        doc.text('Res. Adjudicación:', marginX + 112, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(work.resolucionAdjudicacion, marginX + 142, gridY);

        gridY += 4.5;
        doc.setFont('Helvetica', 'bold');
        doc.text('Monto Vigente Contrato:', marginX, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(`$ ${formatNumber(work.montoContratoVigente, 0)} CLP`, marginX + 32, gridY);

        doc.setFont('Helvetica', 'bold');
        doc.text('Plazo y Ampliaciones:', marginX + 112, gridY);
        doc.setFont('Helvetica', 'normal');
        doc.text(`${work.plazoDiasOriginal} días (+ ${work.plazoAmpliaciones} d. ampliación)`, marginX + 142, gridY);

        gridY += 8;
        doc.setFont('Helvetica', 'bold');
        doc.setFontSize(8);
        doc.text('2. PAUTA DE CALIFICACIÓN DE FACTORES (DECRETO 127/77)', marginX, gridY);
        doc.line(marginX, gridY + 1.5, pageWidth - marginX, gridY + 1.5);

        gridY += 5;
        const colXRubro = marginX;
        const colXDesc = marginX + 50;
        const colXMax = marginX + 145;
        const colXAsig = marginX + 168;
        const colWidth = pageWidth - marginX * 2;

        for (const rubro of rubrosConfig) {
          doc.setFillColor(248, 248, 250);

          gridY += 5.5;
          let subfactorSum = 0;

          for (const sub of rubro.subfactors) {
            const assignedScore = scores[sub.id] || 0;
            subfactorSum += assignedScore;

            doc.setDrawColor(230, 230, 235);
            doc.setLineWidth(0.12);
            doc.line(marginX, gridY, pageWidth - marginX, gridY);

            doc.setFont('Helvetica', 'bold');
            doc.setFontSize(7);

            doc.text(wrapDesc, colXDesc + 2, gridY + 3.2);

            doc.text(`${sub.puntosMaximos}`, colXMax + 8, gridY + 3.2, { align: 'right' });

            doc.setFont('Helvetica', 'bold');
            doc.setTextColor(0, 80, 157);
            doc.text(`${assignedScore.toFixed(0)}`, colXAsig + 12, gridY + 3.2, { align: 'right' });
            doc.setTextColor(30, 30, 30);

            const rowLen = Math.max(wrapTitle.length, wrapDesc.length);
            gridY += Math.max(8, rowLen * 3.5);

          rubroSubtotals[rubro.id] = subfactorSum;

          doc.setFillColor(242, 245, 249);
          doc.rect(marginX, gridY, colWidth, 5, 'F');
          doc.setFont('Helvetica', 'bold');
          doc.setFontSize(7);
          doc.text(`Subtotal Rubro ${rubro.id} (Promedio base 0-100):`, colXRubro + 2, gridY + 3.5);
          
          const subMax = rubro.subfactors.reduce((a, b) => a + b.puntosMaximos, 0);
          const subPercentage = (subfactorSum / subMax) * 100;
          doc.text(`${subfactorSum.toFixed(0)} / ${subMax}`, colXMax + 8, gridY + 3.5, { align: 'right' });
          
          doc.setTextColor(0, 80, 157);
          doc.text(`${subPercentage.toFixed(1)}% (Pond: ${(subPercentage * rubro.peso).toFixed(2)} pts)`, colXAsig + 15, gridY + 3.5, { align: 'right' });
          doc.setTextColor(30, 30, 30);

          gridY += 6;
        }

        doc.setDrawColor(0, 80, 157);
        doc.setLineWidth(0.4);
        doc.line(marginX, gridY, pageWidth - marginX, gridY);

        gridY += 3;
        doc.setFillColor(240, 246, 255);

        doc.text('4. COMISIÓN CALIFICADORA DE OBRAS (ARTÍCULO 36 D.S. 127/77)', marginX, gridY);
        doc.line(marginX, gridY + 1.2, pageWidth - marginX, gridY + 1.2);

        doc.line(marginX + colWidthSig * 2 + 5, gridY, pageWidth - marginX - 5, gridY);

        doc.text('FIRMA Y TIMBRE', marginX + colWidthSig / 2, gridY + 7, { align: 'center' });

        doc.text('FIRMA / FECHA', marginX + colWidthSig * 2.5, gridY + 7, { align: 'center' });

        return doc;
      }
